services:
  api:
    build: .
    command: python -m uvicorn gehenna_api.app:app --host 0.0.0.0 --port 8002
    ports:
      - "8002:8002"
    volumes:
      - .:/app
    environment:
      - DATABASE_URL=sqlite:////app/database.db
      - SECRET_KEY=dev-secret-key
    restart: unless-stopped

  web:
    build: .
    command: python gehenna_web/run.py
    ports:
      - "5000:5000"
    volumes:
      - .:/app
    environment:
      - API_BASE_URL=http://api:8002
      - SECRET_KEY=dev-secret-key
    depends_on:
      - api
    restart: unless-stopped
