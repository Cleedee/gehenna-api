{% extends "base.html" %}

{% block title %}{{ user.username if user else 'User' }}{% endblock %}

{% block content %}
{% if user %}
<div class="card">
    <div class="card-header">
        <h3>{{ user.username }}</h3>
    </div>
    <div class="card-body">
        <p><strong>Email:</strong> {{ user.email }}</p>
        <p><strong>ID:</strong> {{ user.id }}</p>
    </div>
</div>
{% else %}
<p class="text-muted">User not found.</p>
{% endif %}

<a href="{{ url_for('users.list') }}" class="btn btn-secondary mt-3">Back</a>
{% endblock %}
